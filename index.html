<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kyogoku 產品資訊系統</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="line-guide" class="line-guide">
        <div class="guide-content">
            <div class="guide-header">⚠️ 偵測到 LINE 瀏覽器環境</div>
            <p>1. 點擊螢幕 <span class="highlight">「...」</span></p>
            <p>2. 選擇 <span class="highlight">「以預設瀏覽器開啟」</span></p>
            <button class="guide-btn" onclick="document.getElementById('line-guide').style.display='none'">我知道了</button>
        </div>
    </div>

    <div class="overlay" id="overlay" onclick="closeAllPanels()"></div>

    <header class="header">
        <button class="icon-btn neon-border menu-trigger" onclick="toggleSidebar(true)">
            <span class="bar"></span><span class="bar"></span><span class="bar"></span>
        </button>
        <div class="search-group">
            <div class="search-input-wrapper neon-border">
                <input type="text" id="searchInput" placeholder="搜尋產品...">
                <button id="searchMicBtn" class="inner-mic-btn" onclick="startSpeechRecognition('searchInput', 'searchMicBtn', true)">🎤</button>
            </div>
            <button class="search-btn neon-border" onclick="searchCard()">GO</button>
        </div>
    </header>

    <main class="scene" id="scene">
        <div class="carousel" id="carousel"></div>
    </main>

    <button class="fab neon-border" onclick="openAddMode()">+</button>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">KYOGOKU 選單</div>
        <div class="sidebar-content">
            <div class="sidebar-section-title">功能導航</div>
            <a href="https://mvcking.github.io/Live-Streaming-Schedule/LiveStreamingSchedule.html" class="nav-link" target="_blank">
                <div class="nav-icon-box">
                    <img src="https://www.google.com/s2/favicons?sz=64&domain=mvcking.github.io" class="nav-icon">
                </div>
                <div class="nav-text">
                    <span class="main-text">直播排班系統</span>
                    <span class="sub-text">Live Schedule</span>
                </div>
            </a>
            </div>
        <div class="sidebar-footer">© 2024 Kyogoku System</div>
    </div>

    <div class="panel" id="adminPanel">
        <div class="panel-handle" onclick="toggleAdmin(false)"></div>
        <h3 id="panelTitle">產品資訊</h3>
        <input type="hidden" id="editIndex" value="-1">
        
        <div class="form-body">
            <div class="input-flex">
                <input type="text" id="cardName" placeholder="產品名稱" class="neon-input">
                <input type="number" id="cardPrice" placeholder="價格" style="width: 85px;" class="neon-input">
            </div>
            
            <div class="upload-box neon-border" onclick="document.getElementById('cardImgFile').click()">
                <div id="uploadPlaceholder">
                    <span class="cam">📸</span>
                    <p id="uploadStatus">拍照或上傳 (自動壓縮)</p>
                </div>
                <input type="file" id="cardImgFile" accept="image/*" capture="environment" style="display:none" onchange="handleImageUpload(this)">
                <div id="previewWrapper" style="display:none;">
                    <img id="imgPreview">
                </div>
            </div>
            <input type="hidden" id="cardImgBase64"> 

            <div class="textarea-container neon-border">
                <textarea id="cardBack" placeholder="產品規格與介紹..." rows="4" class="neon-input"></textarea>
                <button id="panelMicBtn" class="mic-btn-floating" onclick="startSpeechRecognition('cardBack', 'panelMicBtn', false)">🎤</button>
            </div>
            
            <div class="panel-btns">
                <button id="saveBtn" class="btn-save neon-border" onclick="saveCard()">確認儲存</button>
                <button id="deleteBtn" class="btn-del" style="display:none;" onclick="deleteCard()">刪除產品</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
