<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Neon Mall - Icon Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="admin-overlay" id="overlay"></div>

    <!-- 側邊導航欄 -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h3 class="sidebar-title">快速連結</h3>
            <button class="close-sidebar" onclick="toggleSidebar(false)">&times;</button>
        </div>
        <div class="sidebar-content">
            <a href="https://mvcking.github.io/Live-Streaming-Schedule/LiveStreamingSchedule.html" class="nav-item">
                <img src="https://cdn-icons-png.flaticon.com/512/3048/3048371.png" class="nav-icon" alt="icon">
                <span>直播排班系統</span>
            </a>
        </div>
    </div>

    <!-- 頂部搜尋列 -->
    <div class="search-bar">
        <button class="menu-btn" onclick="toggleSidebar(true)">&#9776;</button>
        <div class="search-input-group">
            <input type="text" id="searchInput" placeholder="搜尋產品...">
            <button class="search-submit" onclick="searchCard()">GO</button>
        </div>
    </div>

    <!-- 3D 核心展示區 -->
    <div class="container">
        <div class="carousel" id="carousel"></div>
    </div>

    <!-- 浮動新增按鈕 -->
    <button class="fab-btn" onclick="openAddMode()">+</button>

    <!-- 編輯面板 -->
    <div class="admin-panel" id="adminPanel">
        <div class="close-handle"></div>
        <h3 id="panelTitle" style="color:#00f2ff; margin-bottom:15px; text-align: center;">新增產品資訊</h3>
        <input type="hidden" id="editIndex" value="-1">
        <div class="form-group">
            <input type="text" id="cardName" placeholder="產品名稱">
            <input type="number" id="cardPrice" placeholder="銷售價格">
            <input type="text" id="cardImg" placeholder="圖片 URL (可留空)">
            <textarea id="cardBack" placeholder="產品詳細介紹..." rows="3"></textarea>
            <button id="saveBtn" onclick="saveCard()">儲存資訊</button>
            <button onclick="toggleAdmin(false)" style="width:100%; margin-top:10px; background:none; border:none; color:#666;">取消</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
