<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kyogoku 產品資訊系統</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="line-guide" class="line-guide-container">
        <div class="line-guide-box">
            <div class="guide-title">⚠️ 請使用外部瀏覽器</div>
            <p>為確保功能正常運作：</p>
            <p>請點選 <span class="accent">「...」</span> 並選擇 <span class="accent">「以預設瀏覽器開啟」</span></p>
            <button class="guide-action-btn" onclick="document.getElementById('line-guide').style.display='none'">我知道了</button>
        </div>
    </div>

    <div class="global-overlay" id="globalOverlay" onclick="closeAllPanels()"></div>

    <header class="top-nav">
        <div class="nav-center-wrapper">
            <button class="menu-toggle-btn neon-ui" onclick="toggleSidebar(true)">
                <div class="hamburger-icon">
                    <span></span><span></span><span></span>
                </div>
            </button>
            
            <div class="search-container">
                <div class="search-bar-wrap neon-ui">
                    <input type="text" id="searchInput" placeholder="搜尋產品...">

                    <button id="searchMicBtn" class="mic-icon-btn" onclick="startSpeechRecognition('searchInput', 'searchMicBtn', true)">🎤</button>
                </div>
                <button class="go-action-btn neon-ui" onclick="searchCard()">GO</button>
            </div>
        </div>
    </header>

    <main class="main-stage" id="mainStage">
        <div class="carousel-3d" id="carousel3d"></div>
    </main>

    <button class="floating-add-btn neon-ui" onclick="openAddMode()">+</button>

    <nav class="side-menu" id="sideMenu">
        <div class="side-menu-header">KYOGOKU MENU</div>
        <div class="side-menu-body">
            <div class="menu-label">系統功能導航</div>
            <a href="https://mvcking.github.io/KG/lss.html" class="menu-item" target="_blank">
                <div class="menu-item-icon">📅</div>
                <div class="menu-item-text">
                    <p class="title">直播排班系統</p>
                    <p class="desc">Live Schedule Management</p>
                </div>
            </a>
        </div>
        <div class="side-menu-footer">System v2.0</div>
    </nav>

    <div class="admin-panel" id="adminPanel">
        <div class="panel-drag-handle" onclick="toggleAdmin(false)"></div>
        <h3 id="panelTitle">產品資訊</h3>
        <input type="hidden" id="editIndex" value="-1">
        
        <div class="admin-form">
            <div class="form-row">
                <input type="text" id="cardName" placeholder="產品名稱" class="admin-input neon-focus">
                <input type="number" id="cardPrice" placeholder="價格" class="admin-input neon-focus" style="width: 100px;">
            </div>
            
            <div class="image-upload-area neon-ui" onclick="document.getElementById('cardImgFile').click()">
                <div id="uploadPlaceholder">
                    <span class="cam-icon">📸</span>
                    <p>點擊上傳圖片 (選填)</p>
                    <small style="color: #666; font-size: 10px;">系統將自動優化大小以利儲存</small>
                </div>
                    <input type="file" id="cardImgFile" accept="image/*" style="display:none" onchange="handleImageUpload(this)">
                <div id="previewWrapper" style="display:none;">
                    <img id="imgPreview">
                </div>
            </div>
            <input type="hidden" id="cardImgBase64"> 

            <div class="desc-area-wrap neon-ui">

                <textarea id="cardBack" placeholder="輸入產品規格與描述..." rows="5"></textarea>
            </div>
            
            <div class="action-buttons">
                <button id="saveBtn" class="save-confirm-btn neon-ui" onclick="saveCard()">確認儲存同步</button>
                <button id="deleteBtn" class="delete-warn-btn" style="display:none;" onclick="deleteCard()">刪除此產品</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
