<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D 髮妝品展示</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="search-bar">
        <input type="text" id="searchInput" placeholder="搜尋髮妝品...">
        <button onclick="searchCard()">搜尋</button>
    </div>

    <div class="container">
        <div class="carousel" id="carousel"></div>
    </div>

    <!-- 浮動新增按鈕 -->
    <button class="fab-btn" id="openDrawer">+</button>

    <!-- 隱藏抽屜面板 -->
    <div class="admin-panel" id="adminPanel">
        <div class="admin-header">
            <h3>新增產品卡片</h3>
            <button class="close-btn" id="closeDrawer">&times;</button>
        </div>
        <div class="form-group">
            <input type="text" id="cardName" placeholder="產品名稱">
            <input type="text" id="cardImg" placeholder="圖片網址 (選填)">
            <textarea id="cardBack" placeholder="產品詳細描述 (支援換行)"></textarea>
            <button id="addBtn" style="background:#28a745; color:white; border:none; padding:12px; border-radius:8px;">確認新增</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
