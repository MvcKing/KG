<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kyogoku 產品資訊網</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- 全域遮罩 -->
    <div class="global-overlay" id="overlay" onclick="closeAllPanels()"></div>

    <!-- 側邊選單：修正預設隱藏與層級 -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header"><h3>系統導航</h3></div>
        <div class="sidebar-content">
            <a href="https://mvcking.github.io/Live-Streaming-Schedule/LiveStreamingSchedule.html" class="nav-item" target="_blank">
                <img src="https://www.google.com/s2/favicons?sz=64&domain=mvcking.github.io" class="nav-icon">
                <span>直播排班系統</span>
            </a>
        </div>
    </div>

    <!-- 頂部搜尋列 -->
    <div class="search-bar">
        <button class="menu-btn neon-btn" onclick="toggleSidebar(true)">&#9776;</button>
        <div class="search-input-group">
            <input type="text" id="searchInput" placeholder="搜尋產品名稱...">
            <button class="search-submit neon-btn" onclick="searchCard()">GO</button>
        </div>
    </div>

    <!-- 3D 轉盤容器 -->
    <div class="container">
        <div class="carousel" id="carousel"></div>
    </div>

    <!-- 懸浮新增按鈕 -->
    <button class="fab-btn" onclick="openAddMode()">+</button>

    <!-- 編輯與新增面板 -->
    <div class="admin-panel" id="adminPanel">
        <div class="close-handle" onclick="toggleAdmin(false)"></div>
        <h3 id="panelTitle" class="panel-title">產品資訊編輯</h3>
        <input type="hidden" id="editIndex" value="-1">
        
        <div class="form-box">
            <label class="field-label">產品基本資訊</label>
            <div class="input-row">
                <input type="text" id="cardName" class="neon-input" placeholder="產品名稱">
                <input type="number" id="cardPrice" class="neon-input" placeholder="價格" style="width: 100px;">
            </div>
            
            <label class="field-label">產品圖片 (支援相機拍照)</label>
            <div class="upload-zone" onclick="document.getElementById('cardImgFile').click()">
                <div id="uploadPlaceholder">
                    <span class="cam-icon">📸</span>
                    <p id="uploadStatus">點擊開啟相機或相簿</p>
                </div>
                <input type="file" id="cardImgFile" accept="image/*" capture="environment" style="display:none" onchange="previewImage(this)">
                <div id="previewWrapper" style="display:none; width:100%;">
                    <img id="imgPreview" class="preview-img">
                </div>
            </div>
            <input type="hidden" id="cardImgBase64"> 

            <label class="field-label">詳細介紹</label>
            <textarea id="cardBack" class="neon-input" placeholder="請輸入產品規格或介紹..." rows="3"></textarea>
            
            <div class="action-group">
                <button id="saveBtn" class="btn-confirm" onclick="saveCard()">確認儲存</button>
                <button id="deleteBtn" class="btn-delete" style="display:none;" onclick="deleteCard()">刪除此產品</button>
                <button class="btn-cancel" onclick="toggleAdmin(false)">取消</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
