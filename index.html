<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D 產品管理系統</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- 頂部搜尋列 -->
    <div class="search-bar">
        <input type="text" id="searchInput" placeholder="搜尋髮妝品名稱 (例如：洗髮精)...">
        <button onclick="searchCard()">搜尋定位</button>
    </div>

    <!-- 3D 輪播主區域 -->
    <div class="container">
        <div class="carousel" id="carousel">
            <!-- 由 JavaScript 動態產生 -->
        </div>
    </div>

    <!-- 下方新增卡片區域 -->
    <div class="admin-panel">
        <h3>新增髮妝品卡片</h3>
        <div class="form-group">
            <input type="text" id="cardName" placeholder="卡片名稱 (如：深層洗髮精)">
            <input type="text" id="cardImg" placeholder="圖片連結 (URL)">
            <textarea id="cardBack" placeholder="背面資訊 (自動換行整理)"></textarea>
            <button id="addBtn">新增至輪播圖</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
