<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KYOGOKU Shopee-直播排班管理系統</title>
    <link rel="icon" href="https://github.com/MvcKing/KG/blob/5941373008c97995ac8bcb97ad008a0b5786d219/Butterfly%20icon.png?raw=true" type="image/png">
    <style>
        :root { 
            --primary: #bb86fc;
            --secondary: #03dac6;
            --time-purple: #d69dff;
            --today-blue: #00d2ff;
            --bg: #0f111a; 
            --card-bg: rgba(30, 33, 45, 0.8);
            --border: rgba(255, 255, 255, 0.1); 
            --text: #e0e0e0; 
            --danger: #cf6679; 
            --note-bg: rgba(187, 134, 252, 0.1); 
            --note-text: #bb86fc; 
            --accent-gradient: linear-gradient(45deg, #ff00cc, #3333ff);
        }

        body { 
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; 
            background: var(--bg); 
            background-image: radial-gradient(circle at 50% 0%, #1a1e2e 0%, #0f111a 100%);
            margin: 0; 
            padding: 15px; 
            color: var(--text); 
            min-height: 100vh;
        }

        /* 頂部導航欄 */
        .top-nav {
            display: flex;
            justify-content: center;
            padding: 15px 0;
            margin-bottom: 10px;
        }

        .nav-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 25px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--primary);
            border-radius: 50px;
            color: white;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(187, 134, 252, 0.2);
            backdrop-filter: blur(5px);
        }

        .nav-btn:hover {
            background: var(--primary);
            color: #0f111a;
            box-shadow: 0 0 25px rgba(187, 134, 252, 0.5);
            transform: translateY(-2px);
        }

        .nav-btn img {
            width: 20px;
            height: 20px;
            filter: drop-shadow(0 0 2px rgba(255,255,255,0.5));
        }

        .calendar-container { 
            width: 100%; 
            overflow-x: auto; 
            background: var(--card-bg); 
            backdrop-filter: blur(10px);
            border-radius: 20px; 
            border: 1px solid var(--border);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            margin-bottom: 25px; 
        }

        .calendar-box { padding: 25px; min-width: 900px; } 

        .calendar-header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 25px; 
            border-bottom: 1px solid var(--border); 
            padding-bottom: 15px; 
        }
        .calendar-header h3 { 
            font-size: 24px; 
            margin: 0; 
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900; 
            letter-spacing: 1px;
        }

        #monthSelect {
            background: #2a2d3e;
            color: white;
            border: 1px solid var(--border);
            padding: 8px 15px;
            border-radius: 10px;
            outline: none;
        }

        .calendar-grid { 
            display: grid; 
            grid-template-columns: repeat(7, 1fr); 
            gap: 1px;
            background: var(--border);
            border: 1px solid var(--border);
        }

        .weekday-label { 
            background: rgba(255, 255, 255, 0.05); 
            text-align: center; 
            font-size: 14px; 
            font-weight: bold; 
            padding: 15px 0; 
            color: var(--primary); 
        }

        .day-cell { 
            background: #161922; 
            min-height: 180px; 
            padding: 10px; 
            cursor: pointer; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            position: relative; 
            display: flex; 
            flex-direction: column; 
            z-index: 0; 
            overflow: hidden; 
        }

        .day-cell:hover { background: #1e2230; transform: scale(1.02); z-index: 10; box-shadow: 0 0 20px rgba(0,0,0,0.4); }

        .day-cell::before {
            content: ''; position: absolute; z-index: -2; left: -50%; top: -50%; width: 200%; height: 200%;
            background-repeat: no-repeat; background-size: 50% 50%, 50% 50%;
            background-position: 0 0, 100% 0, 100% 100%, 0 100%;
            animation: rotateGlow 4s linear infinite;
            display: none; 
        }
        .day-cell::after {
            content: ''; position: absolute; z-index: -1; inset: 2px; background: #161922; border-radius: 2px;
            display: none;
        }

        .glow-today::before { display: block; background-image: conic-gradient(transparent, #00d2ff, #3a7bd5, #00d2ff, transparent); }
        .glow-today::after { display: block; }
        .glow-latest-data::before { display: block; background-image: conic-gradient(transparent, #ff5722, #ffeb3b, #ff5722, transparent); }
        .glow-latest-data::after { display: block; }

        @keyframes rotateGlow { 100% { transform: rotate(1turn); } }

        .day-num { font-size: 20px; font-weight: 800; color: rgba(255,255,255,0.2); margin-bottom: 8px; position: relative; z-index: 2; }
        .day-cell.has-data .day-num { color: var(--primary); }

        .day-info { font-size: 12px; line-height: 1.6; flex-grow: 1; position: relative; z-index: 2; }
        .info-txt { font-weight: 500; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 3px; color: #b0b3b8; }
        
        .info-time { color: var(--time-purple) !important; font-weight: bold; }

        .info-note-box { 
            margin-top: auto; 
            background: var(--note-bg); 
            color: var(--note-text); 
            font-size: 11px; 
            padding: 6px 8px; 
            border-radius: 6px; 
            border-right: 2px solid var(--primary); 
            min-height: 40px;
            z-index: 2;
        }

        .edit-section { 
            background: var(--card-bg); 
            backdrop-filter: blur(15px);
            border-radius: 20px; 
            padding: 30px; 
            display: none; 
            margin-bottom: 60px; 
            border: 1px solid var(--border);
            border-top: 4px solid var(--primary);
        }
        .edit-section.active { display: block; animation: fadeInUp 0.5s ease; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .edit-section h3 { margin-top: 0; color: var(--primary); font-size: 22px; margin-bottom: 25px; }
        
        .input-row { display: flex; gap: 20px; flex-wrap: wrap; }
        .input-group { margin-bottom: 22px; flex: 1; min-width: 250px; }
        
        label { display: block; font-size: 13px; color: #999; margin-bottom: 8px; font-weight: 600; }
        input { 
            width: 100%; 
            padding: 14px; 
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--border); 
            border-radius: 12px; 
            font-size: 15px; 
            color: white;
            outline: none; 
        }
        input:focus { border-color: var(--primary); box-shadow: 0 0 10px rgba(187, 134, 252, 0.3); }

        .btn-group { display: flex; gap: 15px; margin-top: 15px; }
        .btn { 
            flex: 1; border: none; padding: 16px; border-radius: 12px; 
            font-weight: 700; font-size: 16px; cursor: pointer; 
            transition: all 0.3s ease; display: flex; align-items: center; justify-content: center; gap: 8px; 
        }
        .btn-save { background: var(--accent-gradient); color: white; }
        .btn-save:hover { filter: brightness(1.2); transform: translateY(-2px); }
        .btn-clear { background: #333; color: #bbb; border: 1px solid #444; }

        #loader { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(15, 17, 26, 0.95); 
            display: none; justify-content: center; align-items: center; 
            z-index: 1000; flex-direction: column; 
        }
        .spinner { 
            border: 3px solid rgba(255,255,255,0.1); 
            border-top: 3px solid var(--primary); 
            border-radius: 50%; width: 40px; height: 40px; 
            animation: spin 1s linear infinite; margin-bottom: 15px; 
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="top-nav">
    <a href="https://mvcking.github.io/KG/index.html" target="_blank" class="nav-btn">
        <img src="https://github.com/MvcKing/KG/blob/5941373008c97995ac8bcb97ad008a0b5786d219/CO2.png?raw=true" alt="KG Icon">
    </a>
</div>

<div id="loader"><div class="spinner"></div><span style="letter-spacing: 2px; color: var(--primary);">SYNCING DATA...</span></div>

<div class="calendar-container">
    <div class="calendar-box">
        <div class="calendar-header">
            <h3 id="monthTitle">LOADING...</h3>
            <select id="monthSelect" onchange="loadMonthlyData()"></select>
        </div>
        <div class="calendar-grid" id="calendarGrid">
            <div class="weekday-label">SUN</div>
            <div class="weekday-label">MON</div>
            <div class="weekday-label">TUE</div>
            <div class="weekday-label">WED</div>
            <div class="weekday-label">THU</div>
            <div class="weekday-label">FRI</div>
            <div class="weekday-label">SAT</div>
        </div>
    </div>
</div>

<div class="edit-section" id="editSection">
    <h3 id="selectedDateTitle">📅 日期選取</h3>
    <div class="input-row">
        <div class="input-group"><label>⏰ 直播時間</label><input type="text" id="time" placeholder="請填寫時間"></div>
        <div class="input-group"><label>📺 直播台名稱</label><input type="text" id="platform" placeholder="直營,毛髮"></div>
    </div>
    <div class="input-row">
        <div class="input-group"><label>🎙️ 直播主 (Host)</label><input type="text" id="host" placeholder="如如,君君,姿姿,蔓蔓"></div>
        <div class="input-group"><label>🤝 小幫手 (Assistant)</label><input type="text" id="assistant" placeholder="Fish,孟孟"></div>
    </div>
    <div class="input-group"><label>📝 備註</label><input type="text" id="note" placeholder="當日特殊事項備註"></div>
    <div class="btn-group">
        <button class="btn btn-clear" id="clearBtn">🗑️ 清除當日</button>
        <button class="btn btn-save" id="saveBtn">💾 儲存並同步更新</button>
    </div>
</div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbyk8csORmUcxozfFFzhb8PG6VUOiTL_LckXDOS-IZzNLlmU9OofDCPIw6ZTdYjgJ4ag/exec"; 
    let fullMonthData = [];

    function init() { setupMonthOptions(); loadMonthlyData(); }
    function setupMonthOptions() {
        const select = document.getElementById('monthSelect');
        const now = new Date();
        for (let i = 0; i < 12; i++) {
            const date = new Date(now.getFullYear(), i, 1);
            const val = `${date.getFullYear()}-${String(i + 1).padStart(2, '0')}`;
            const option = new Option(`${i + 1}月`, val);
            if (i === now.getMonth()) option.selected = true;
            select.add(option);
        }
    }

    async function loadMonthlyData() {
        const selectedMonth = document.getElementById('monthSelect').value;
        document.getElementById('monthTitle').innerText = selectedMonth.replace('-', ' / ') + " SCHEDULE";
        document.getElementById('loader').style.display = 'flex';
        try {
            const resp = await fetch(`${GAS_URL}?month=${selectedMonth}`);
            fullMonthData = await resp.json();
            renderCalendar(selectedMonth);
        } catch (e) { alert("連線超時，請檢查網絡"); }
        document.getElementById('loader').style.display = 'none';
    }

    function renderCalendar(monthStr) {
        const [year, month] = monthStr.split('-').map(Number);
        const grid = document.getElementById('calendarGrid');
        while (grid.children.length > 7) grid.removeChild(grid.lastChild);

        const firstDay = new Date(year, month - 1, 1).getDay();
        const daysInMonth = new Date(year, month, 0).getDate();
        
        const today = new Date();
        today.setHours(0, 0, 0, 0);
        const todayStr = `${today.getFullYear()}/${String(today.getMonth() + 1).padStart(2, '0')}/${String(today.getDate()).padStart(2, '0')}`;

        const latestDataRecord = fullMonthData
            .filter(r => {
                const rDate = new Date(r.Date.replace(/-/g, '/'));
                const hasInfo = r.Platform || r.Host || r["Host (直播主)"] || r.Note;
                return rDate > today && hasInfo;
            })
            .sort((a, b) => new Date(a.Date.replace(/-/g, '/')) - new Date(b.Date.replace(/-/g, '/')))[0];
        
        const latestDateStr = latestDataRecord ? latestDataRecord.Date.replace(/-/g, '/') : null;

        for (let i = 0; i < firstDay; i++) {
            const empty = document.createElement('div');
            empty.className = "day-cell"; empty.style.background = "rgba(0,0,0,0.2)";
            grid.appendChild(empty);
        }

        for (let d = 1; d <= daysInMonth; d++) {
            const dateStr = `${year}/${String(month).padStart(2, '0')}/${String(d).padStart(2, '0')}`;
            const record = fullMonthData.find(r => r.Date.replace(/-/g, '/') === dateStr);
            const hasData = record && (record.Platform || record.Host || record["Host (直播主)"] || record.Note);
            
            const cell = document.createElement('div');
            cell.className = `day-cell ${hasData ? 'has-data' : ''}`;
            
            if (dateStr === todayStr) {
                cell.classList.add('glow-today');
            } else if (dateStr === latestDateStr) {
                cell.classList.add('glow-latest-data');
            }
            
            let infoHtml = '';
            if (record) {
                const t = (record.Time || '').includes("1899") ? "" : (record.Time || '');
                const p = record.Platform || '';
                const h = record["Host (直播主)"] || record.Host || '';
                const a = record["Assistant (小幫手)"] || record.Assistant || '';
                const n = record.Note || '';
                if (p || h || n) {
                    infoHtml = `
                        <div class="day-info">
                            <span class="info-txt">📺 <span style="color:#fff">${p}</span></span>
                            <span class="info-txt info-time">⏰ ${t}</span>
                            <span class="info-txt" style="color:var(--secondary);">🎙️ ${h}</span>
                            <span class="info-txt" style="color:var(--today-blue);">🤝 ${a}</span>
                        </div>
                        ${n ? `<div class="info-note-box">📝 ${n}</div>` : ''}
                    `;
                }
            }
            cell.innerHTML = `<div class="day-num">${d}</div>${infoHtml}`;
            cell.onclick = () => openEdit(dateStr, record);
            grid.appendChild(cell);
        }
    }

    function openEdit(dateStr, record) {
        document.getElementById('editSection').classList.add('active');
        document.getElementById('selectedDateTitle').innerText = `📅 ${dateStr} 編輯模式`;
        document.getElementById('time').value = (record && record.Time && !record.Time.includes("1899")) ? record.Time : '';
        document.getElementById('platform').value = record ? (record.Platform || '') : '';
        document.getElementById('host').value = record ? (record["Host (直播主)"] || record.Host || '') : '';
        document.getElementById('assistant').value = record ? (record["Assistant (小幫手)"] || record.Assistant || '') : '';
        document.getElementById('note').value = record ? (record.Note || '') : '';
        document.getElementById('saveBtn').onclick = () => processAction(dateStr, false);
        document.getElementById('clearBtn').onclick = () => { if(confirm("確定清除此日期的所有排班？")) processAction(dateStr, true); };
        document.getElementById('editSection').scrollIntoView({ behavior: 'smooth' });
    }

    async function processAction(dateStr, isClear) {
        const [year, month, day] = dateStr.split('/');
        const dateObj = new Date(year, month - 1, day);
        const daysOfWeek = ["星期日", "星期一", "星期二", "星期三", "星期四", "星期五", "星期六"];
        const data = {
            date: dateStr, month: `${year}-${month}`, weekday: daysOfWeek[dateObj.getDay()],
            time: isClear ? '' : document.getElementById('time').value,
            platform: isClear ? '' : document.getElementById('platform').value,
            host: isClear ? '' : document.getElementById('host').value,
            assistant: isClear ? '' : document.getElementById('assistant').value,
            note: isClear ? '' : document.getElementById('note').value
        };
        document.getElementById('loader').style.display = 'flex';
        try {
            await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(data) });
            alert("資料已同步至雲端"); loadMonthlyData();
        } catch (e) { alert("同步失敗，請稍後再試"); }
        document.getElementById('loader').style.display = 'none';
    }

    init();
</script>
</body>
</html>
