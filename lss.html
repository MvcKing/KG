<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KYOGOKU Shopee-直播排班管理系統</title>
    <link rel="icon" href="https://github.com/MvcKing/Live-Streaming-Schedule/blob/main/Butterfly%20icon.png?raw=true" type="image/png">
    <style>
        :root { 
            --primary: #bb86fc; 
            --secondary: #03dac6; 
            --time-purple: #d69dff; 
            --today-blue: #00d2ff;
            --bg: #0f111a; 
            --card-bg: rgba(30, 33, 45, 0.8);
            --border: rgba(255, 255, 255, 0.1); 
            --text: #e0e0e0; 
            --danger: #cf6679; 
            --note-bg: rgba(187, 134, 252, 0.1); 
            --note-text: #bb86fc; 
            --accent-gradient: linear-gradient(45deg, #ff00cc, #3333ff);
        }

        body { 
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; 
            background: var(--bg); 
            background-image: radial-gradient(circle at 50% 0%, #1a1e2e 0%, #0f111a 100%);
            margin: 0; 
            padding: 15px; 
            color: var(--text); 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 統一最大容器寬度，避免電腦版拉得太長 */
        .main-wrapper {
            width: 100%;
            max-width: 1200px;
        }

        /* 日曆容器 */
        .calendar-container { 
            width: 100%; 
            overflow-x: auto; 
            background: var(--card-bg); 
            backdrop-filter: blur(10px);
            border-radius: 20px; 
            border: 1px solid var(--border);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            margin-bottom: 25px; 
        }

        .calendar-box { padding: 25px; min-width: 900px; } 

        .calendar-header { 
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center; 
            margin-bottom: 25px; 
            border-bottom: 1px solid var(--border); 
            padding-bottom: 15px; 
        }

        .calendar-header h3 { 
            font-size: 24px; margin: 0; 
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900; letter-spacing: 1px;
            justify-self: start;
        }

        .nav-icon-btn {
            display: flex; align-items: center; justify-content: center;
            width: 45px; height: 45px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--primary);
            border-radius: 12px;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(187, 134, 252, 0.2);
        }
        .nav-icon-btn:hover { background: var(--primary); transform: scale(1.1); }
        .nav-icon-btn img { width: 28px; height: 28px; }

        #monthSelect {
            background: #2a2d3e; color: white; border: 1px solid var(--border);
            padding: 8px 15px; border-radius: 10px; outline: none; justify-self: end;
        }

        .calendar-grid { 
            display: grid; grid-template-columns: repeat(7, 1fr); 
            gap: 1px; background: var(--border); border: 1px solid var(--border);
        }

        .weekday-label { 
            background: rgba(255, 255, 255, 0.05); text-align: center; 
            font-size: 14px; font-weight: bold; padding: 15px 0; color: var(--primary); 
        }

        .day-cell { 
            background: #161922; min-height: 180px; padding: 10px; 
            cursor: pointer; transition: all 0.3s ease; position: relative; 
            display: flex; flex-direction: column; overflow: hidden; 
        }
        .day-cell:hover { background: #1e2230; z-index: 5; }

        .day-num { font-size: 20px; font-weight: 800; color: rgba(255,255,255,0.15); margin-bottom: 8px; }
        .day-cell.has-data .day-num { color: var(--primary); }

        .day-info { font-size: 12px; line-height: 1.6; flex-grow: 1; }
        .info-txt { font-weight: 500; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 3px; color: #b0b3b8; }
        .info-time { color: var(--time-purple) !important; font-weight: bold; }

        .info-note-box { 
            margin-top: auto; background: var(--note-bg); color: var(--note-text); 
            font-size: 11px; padding: 6px 8px; border-radius: 6px; 
            border-right: 2px solid var(--primary); min-height: 40px;
        }

        /* --- 編輯面板優化方案 --- */
        .edit-section { 
            background: var(--card-bg); 
            backdrop-filter: blur(15px);
            border-radius: 20px; 
            padding: 30px; 
            display: none; 
            margin: 0 auto 60px auto; 
            width: 90%;
            max-width: 800px; /* 限制寬度，避免過長 */
            border: 1px solid var(--border);
            border-top: 4px solid var(--primary);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        .edit-section.active { display: block; animation: fadeInUp 0.5s ease; }

        .edit-section h3 { margin-top: 0; color: var(--primary); font-size: 22px; margin-bottom: 25px; text-align: center; }

        /* 輸入框佈局：電腦版雙欄，手機版單欄 */
        .input-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 20px; 
            margin-bottom: 20px;
        }

        .input-group { display: flex; flex-direction: column; }
        .input-group.full-width { grid-column: span 2; } /* 備註欄位佔滿兩格 */

        label { display: block; font-size: 13px; color: #999; margin-bottom: 8px; font-weight: 600; }
        
        input { 
            width: 100%; 
            padding: 12px 15px; 
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border); 
            border-radius: 10px; 
            font-size: 15px; 
            color: white;
            outline: none; 
            box-sizing: border-box; /* 重要：確保 padding 不會撐開長度 */
            transition: 0.3s;
        }
        input:focus { border-color: var(--primary); background: rgba(187, 134, 252, 0.05); }

        .btn-group { 
            display: flex; 
            gap: 15px; 
            margin-top: 30px; 
            max-width: 500px; /* 限制按鈕區寬度 */
            margin-left: auto;
            margin-right: auto;
        }
        .btn { flex: 1; border: none; padding: 14px; border-radius: 12px; font-weight: 700; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 15px; }
        .btn-save { background: var(--accent-gradient); color: white; }
        .btn-clear { background: #2a2d3e; color: #bbb; border: 1px solid #444; }
        .btn-save:hover { transform: translateY(-2px); filter: brightness(1.1); }

        /* 手機版適配 */
        @media (max-width: 768px) {
            .input-grid { grid-template-columns: 1fr; }
            .input-group.full-width { grid-column: span 1; }
            .edit-section { padding: 20px; width: 95%; }
            .calendar-header h3 { font-size: 18px; }
        }

        /* Loader */
        #loader { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(15, 17, 26, 0.95); display: none; 
            justify-content: center; align-items: center; z-index: 1000; flex-direction: column; 
        }
        .spinner { border: 3px solid rgba(255,255,255,0.1); border-top: 3px solid var(--primary); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div id="loader"><div class="spinner"></div><br><span style="letter-spacing: 2px; color: var(--primary);">SYNCING DATA...</span></div>

    <div class="calendar-container">
        <div class="calendar-box">
            <div class="calendar-header">
                <h3 id="monthTitle">LOADING...</h3>
                <a href="https://mvcking.github.io/KG/index.html" target="_blank" class="nav-icon-btn" title="KG 產品資訊系統">
                    <img src="https://github.com/MvcKing/Live-Streaming-Schedule/blob/main/Butterfly%20icon.png?raw=true" alt="KG Icon">
                </a>
                <select id="monthSelect" onchange="loadMonthlyData()"></select>
            </div>

            <div class="calendar-grid" id="calendarGrid">
                <div class="weekday-label">SUN</div><div class="weekday-label">MON</div><div class="weekday-label">TUE</div><div class="weekday-label">WED</div><div class="weekday-label">THU</div><div class="weekday-label">FRI</div><div class="weekday-label">SAT</div>
            </div>
        </div>
    </div>

    <!-- 編輯面板：已調整長度 -->
    <div class="edit-section" id="editSection">
        <h3 id="selectedDateTitle">📅 編輯排班</h3>
        <div class="input-grid">
            <div class="input-group">
                <label>⏰ 直播時間</label>
                <input type="text" id="time" placeholder="例如：19:00">
            </div>
            <div class="input-group">
                <label>📺 直播台名稱</label>
                <input type="text" id="platform" placeholder="直營 / 毛髮">
            </div>
            <div class="input-group">
                <label>🎙️ 直播主 (Host)</label>
                <input type="text" id="host" placeholder="請輸入姓名">
            </div>
            <div class="input-group">
                <label>🤝 小幫手 (Assistant)</label>
                <input type="text" id="assistant" placeholder="請輸入姓名">
            </div>
            <div class="input-group full-width">
                <label>📝 備註</label>
                <input type="text" id="note" placeholder="當日特殊事項備註">
            </div>
        </div>
        <div class="btn-group">
            <button class="btn btn-clear" id="clearBtn">🗑️ 清除</button>
            <button class="btn btn-save" id="saveBtn">💾 儲存更新</button>
        </div>
    </div>
</div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbyk8csORmUcxozfFFzhb8PG6VUOiTL_LckXDOS-IZzNLlmU9OofDCPIw6ZTdYjgJ4ag/exec"; 
    let fullMonthData = [];

    function init() { setupMonthOptions(); loadMonthlyData(); }
    function setupMonthOptions() {
        const select = document.getElementById('monthSelect');
        const now = new Date();
        for (let i = 0; i < 12; i++) {
            const date = new Date(now.getFullYear(), i, 1);
            const val = `${date.getFullYear()}-${String(i + 1).padStart(2, '0')}`;
            const option = new Option(`${i + 1}月`, val);
            if (i === now.getMonth()) option.selected = true;
            select.add(option);
        }
    }

    async function loadMonthlyData() {
        const selectedMonth = document.getElementById('monthSelect').value;
        document.getElementById('monthTitle').innerText = selectedMonth.replace('-', ' / ') + " SCHEDULE";
        document.getElementById('loader').style.display = 'flex';
        try {
            const resp = await fetch(`${GAS_URL}?month=${selectedMonth}`);
            fullMonthData = await resp.json();
            renderCalendar(selectedMonth);
        } catch (e) { alert("連線超時，請檢查網絡"); }
        document.getElementById('loader').style.display = 'none';
    }

    function renderCalendar(monthStr) {
        const [year, month] = monthStr.split('-').map(Number);
        const grid = document.getElementById('calendarGrid');
        while (grid.children.length > 7) grid.removeChild(grid.lastChild);

        const firstDay = new Date(year, month - 1, 1).getDay();
        const daysInMonth = new Date(year, month, 0).getDate();
        const today = new Date();
        today.setHours(0, 0, 0, 0);
        const todayStr = `${today.getFullYear()}/${String(today.getMonth() + 1).padStart(2, '0')}/${String(today.getDate()).padStart(2, '0')}`;

        for (let i = 0; i < firstDay; i++) {
            const empty = document.createElement('div');
            empty.className = "day-cell"; empty.style.background = "rgba(0,0,0,0.2)";
            grid.appendChild(empty);
        }

        for (let d = 1; d <= daysInMonth; d++) {
            const dateStr = `${year}/${String(month).padStart(2, '0')}/${String(d).padStart(2, '0')}`;
            const record = fullMonthData.find(r => r.Date.replace(/-/g, '/') === dateStr);
            const hasData = record && (record.Platform || record.Host || record["Host (直播主)"] || record.Note);
            
            const cell = document.createElement('div');
            cell.className = `day-cell ${hasData ? 'has-data' : ''}`;
            if (dateStr === todayStr) cell.style.boxShadow = "inset 0 0 10px var(--today-blue)";
            
            let infoHtml = '';
            if (record) {
                const t = (record.Time || '').includes("1899") ? "" : (record.Time || '');
                const h = record["Host (直播主)"] || record.Host || '';
                const a = record["Assistant (小幫手)"] || record.Assistant || '';
                const p = record.Platform || '';
                const n = record.Note || '';
                if (p || h || n) {
                    infoHtml = `
                        <div class="day-info">
                            <span class="info-txt">📺 <span style="color:#fff">${p}</span></span>
                            <span class="info-txt info-time">⏰ ${t}</span>
                            <span class="info-txt" style="color:var(--secondary);">🎙️ ${h}</span>
                            <span class="info-txt" style="color:var(--today-blue);">🤝 ${a}</span>
                        </div>
                        ${n ? `<div class="info-note-box">📝 ${n}</div>` : ''}
                    `;
                }
            }
            cell.innerHTML = `<div class="day-num">${d}</div>${infoHtml}`;
            cell.onclick = () => openEdit(dateStr, record);
            grid.appendChild(cell);
        }
    }

    function openEdit(dateStr, record) {
        document.getElementById('editSection').classList.add('active');
        document.getElementById('selectedDateTitle').innerText = `📅 ${dateStr} 編輯排班`;
        document.getElementById('time').value = (record && record.Time && !record.Time.includes("1899")) ? record.Time : '';
        document.getElementById('platform').value = record ? (record.Platform || '') : '';
        document.getElementById('host').value = record ? (record["Host (直播主)"] || record.Host || '') : '';
        document.getElementById('assistant').value = record ? (record["Assistant (小幫手)"] || record.Assistant || '') : '';
        document.getElementById('note').value = record ? (record.Note || '') : '';
        document.getElementById('saveBtn').onclick = () => processAction(dateStr, false);
        document.getElementById('clearBtn').onclick = () => { if(confirm("確定清除？")) processAction(dateStr, true); };
        document.getElementById('editSection').scrollIntoView({ behavior: 'smooth' });
    }

    async function processAction(dateStr, isClear) {
        const [year, month, day] = dateStr.split('/');
        const dateObj = new Date(year, month - 1, day);
        const daysOfWeek = ["星期日", "星期一", "星期二", "星期三", "星期四", "星期五", "星期六"];
        const data = {
            date: dateStr, month: `${year}-${month}`, weekday: daysOfWeek[dateObj.getDay()],
            time: isClear ? '' : document.getElementById('time').value,
            platform: isClear ? '' : document.getElementById('platform').value,
            host: isClear ? '' : document.getElementById('host').value,
            assistant: isClear ? '' : document.getElementById('assistant').value,
            note: isClear ? '' : document.getElementById('note').value
        };
        document.getElementById('loader').style.display = 'flex';
        try {
            await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(data) });
            alert("成功同步"); loadMonthlyData();
        } catch (e) { alert("同步失敗"); }
        document.getElementById('loader').style.display = 'none';
    }

    init();
</script>
</body>
</html>
